# ============================================================
# Nginx 配置文件 - Ubuntu 24.04
# 文件位置: /etc/nginx/sites-available/daily-report
# 启用命令: sudo ln -s /etc/nginx/sites-available/daily-report /etc/nginx/sites-enabled/
# ============================================================

upstream nodejs_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name warblood.online www.warblood.online;

    # 重定向到 HTTPS
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name warblood.online www.warblood.online;

    # SSL 证书配置
    ssl_certificate /etc/letsencrypt/live/warblood.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/warblood.online/privkey.pem;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # 日志
    access_log /var/log/nginx/daily-report.access.log;
    error_log /var/log/nginx/daily-report.error.log;

    # Gzip 压缩
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # API 代理
    location /api/ {
        proxy_pass http://nodejs_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 60s;
    }

    # 静态资源（管理后台）
    location /admin/ {
        alias /var/www/daily-report/admin-panel/;
        index index.html;
        try_files $uri $uri/ /admin/index.html;
    }

    # 健康检查
    location /health {
        proxy_pass http://nodejs_backend/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # 默认拒绝
    location / {
        return 404;
    }
}
