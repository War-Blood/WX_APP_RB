<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>员工日报 — 管理后台</title>
  <style>
    :root {
      --primary: #07C160;
      --primary-dark: #05994A;
      --bg: #F5F6F8;
      --card: #FFFFFF;
      --border: #E8E8EC;
      --text: #1F1F1F;
      --text-secondary: #888;
      --danger: #E54D42;
      --warn: #FF9F43;
      --shadow: 0 2px 12px rgba(0,0,0,.08);
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ===== 登录页 ===== */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .login-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 40px 36px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .login-card .logo {
      width: 64px;
      height: 64px;
      background: var(--primary);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
    }
    .login-card h1 { font-size: 20px; font-weight: 600; margin-bottom: 6px; }
    .login-card p { color: var(--text-secondary); font-size: 14px; margin-bottom: 32px; }
    .form-group { text-align: left; margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }
    .form-group input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
      background: var(--bg);
    }
    .form-group input:focus { border-color: var(--primary); }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 11px 20px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      width: 100%;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { background: #C0392B; }
    .btn-outline { background: transparent; border: 1.5px solid var(--border); color: var(--text); }
    .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
    .btn-sm { padding: 6px 12px; font-size: 12px; width: auto; }
    .hint {
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--bg);
      padding: 10px 14px;
      border-radius: 8px;
      text-align: left;
      line-height: 1.6;
    }
    .hint code { background: #E8F5E9; color: var(--primary-dark); padding: 1px 5px; border-radius: 4px; font-size: 11px; }
    .error-msg { color: var(--danger); font-size: 13px; margin-top: 8px; text-align: center; }

    /* ===== 管理后台 ===== */
    .admin-layout { display: none; }
    .admin-layout.active { display: block; }
    .admin-header {
      background: var(--primary);
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 6px rgba(7,193,96,.3);
    }
    .admin-header h2 { font-size: 16px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    .admin-header .logout-btn {
      background: rgba(255,255,255,.2);
      border: 1px solid rgba(255,255,255,.4);
      color: #fff;
      padding: 5px 14px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    .admin-content { padding: 20px; max-width: 900px; margin: 0 auto; }

    /* 统计卡片 */
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .stat-card .num { font-size: 28px; font-weight: 700; color: var(--primary); }
    .stat-card .label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

    /* Tab */
    .tab-bar {
      display: flex;
      gap: 4px;
      background: var(--card);
      border-radius: var(--radius);
      padding: 4px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
    }
    .tab-btn {
      flex: 1;
      padding: 8px;
      border: none;
      background: transparent;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all .2s;
    }
    .tab-btn.active { background: var(--primary); color: #fff; }

    /* 搜索栏 */
    .search-bar { display: flex; gap: 8px; margin-bottom: 16px; }
    .search-bar input { flex: 1; padding: 9px 14px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 14px; outline: none; background: var(--card); }
    .search-bar input:focus { border-color: var(--primary); }
    .search-bar .btn { width: auto; padding: 9px 16px; }

    /* 用户列表 */
    .user-list { background: var(--card); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); }
    .user-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .user-item:last-child { border-bottom: none; }
    .user-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), #4CAF50);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      flex-shrink: 0;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name { font-size: 14px; font-weight: 600; }
    .user-meta { font-size: 11px; color: var(--text-secondary); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-admin { background: #E8F5E9; color: var(--primary-dark); }
    .badge-user { background: var(--bg); color: var(--text-secondary); }

    /* 分页 */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 16px;
    }
    .pagination button {
      padding: 6px 14px;
      border: 1.5px solid var(--border);
      background: var(--card);
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
    }
    .pagination button:disabled { opacity: .4; cursor: not-allowed; }
    .pagination span { font-size: 13px; color: var(--text-secondary); }

    /* Toast */
    .toast {
      position: fixed;
      top: 72px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      color: #fff;
      z-index: 999;
      transition: opacity .3s;
      pointer-events: none;
    }
    .toast-success { background: var(--primary); }
    .toast-error { background: var(--danger); }
    .toast-hide { opacity: 0; }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-secondary);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }

    /* 加载 */
    .loading-row { text-align: center; padding: 20px; color: var(--text-secondary); font-size: 13px; }

    @media (max-width: 600px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .admin-content { padding: 12px; }
    }
  </style>
</head>
<body>

<!-- ===== 登录页 ===== -->
<div class="login-wrap" id="loginPage">
  <div class="login-card">
    <div class="logo">📋</div>
    <h1>员工日报管理后台</h1>
    <p>请输入云开发环境配置以继续</p>

    <div class="form-group">
      <label>环境 ID</label>
      <input type="text" id="envId" placeholder="例如：cloud1-xxxxxx" />
    </div>
    <div class="form-group">
      <label>API 密钥 Secret</label>
      <input type="password" id="secret" placeholder="云开发控制台 → 环境设置 → API 密钥" />
    </div>

    <button class="btn btn-primary" id="loginBtn" onclick="doLogin()">登录管理后台</button>
    <div class="error-msg" id="loginError"></div>

    <div class="hint">
      <strong>如何获取配置？</strong><br />
      1. 打开 <code>微信开发者工具</code> → 云开发控制台<br />
      2. 「设置」→「环境设置」→ 复制<strong>环境 ID</strong><br />
      3. 「API 密钥」→ 若未创建则点击「创建密钥」→ 复制
    </div>
  </div>
</div>

<!-- ===== 管理后台 ===== -->
<div class="admin-layout" id="adminLayout">
  <header class="admin-header">
    <h2>📋 员工日报管理后台</h2>
    <button class="logout-btn" onclick="logout()">退出登录</button>
  </header>

  <div class="admin-content">
    <!-- 统计 -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="num" id="statTotal">-</div>
        <div class="label">总用户数</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statAdmin">-</div>
        <div class="label">管理员数</div>
      </div>
      <div class="stat-card">
        <div class="num" id="statUser">-</div>
        <div class="label">普通员工</div>
      </div>
    </div>

    <!-- Tab -->
    <div class="tab-bar">
      <button class="tab-btn active" data-tab="user" onclick="switchTab('user')">用户列表</button>
      <button class="tab-btn" data-tab="admin" onclick="switchTab('admin')">管理员列表</button>
    </div>

    <!-- 搜索（仅用户列表） -->
    <div class="search-bar" id="searchBar">
      <input type="text" id="searchKeyword" placeholder="搜索 openid / 姓名 / 部门..." onkeydown="if(event.key==='Enter')searchUsers()" />
      <button class="btn btn-primary" onclick="searchUsers()">搜索</button>
    </div>

    <!-- 用户列表 -->
    <div class="user-list" id="userList">
      <div class="loading-row">加载中...</div>
    </div>

    <!-- 分页 -->
    <div class="pagination" id="pagination" style="display:none">
      <button id="prevBtn" onclick="changePage(-1)">上一页</button>
      <span id="pageInfo"></span>
      <button id="nextBtn" onclick="changePage(1)">下一页</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast toast-success" id="toast" style="display:none"></div>

<script>
  // ===== 配置 =====
  let CONFIG = { envId: '', secret: '' };
  const PAGE_SIZE = 15;
  let currentTab = 'user';
  let currentPage = 1;
  let searchResult = null; // 搜索结果缓存

  // ===== 工具函数 =====
  const $ = (id) => document.getElementById(id);
  const showToast = (msg, type = 'success') => {
    const t = $('toast');
    t.textContent = msg;
    t.className = `toast toast-${type}`;
    t.style.display = 'block';
    t.classList.remove('toast-hide');
    setTimeout(() => { t.classList.add('toast-hide'); setTimeout(() => t.style.display = 'none', 300); }, 2000);
  };

  const getHeaders = () => ({
    'Content-Type': 'application/json',
    'X-TCB-Api-Secret': CONFIG.secret,
  });

  // 调用云函数
  const callFunction = async (name, data = {}) => {
    const url = `https://api.tcbn.cloud.tencent.com/admin/v2/env/${CONFIG.envId}/triggerCloudFunction`;
    const body = { function_name: name, param: data };
    const res = await fetch(url, {
      method: 'POST',
      headers: getHeaders(),
      body: JSON.stringify(body),
    });
    const json = await res.json();
    return json;
  };

  // ===== 登录 =====
  function saveConfig() {
    localStorage.setItem('admin_config', JSON.stringify(CONFIG));
  }
  function loadConfig() {
    try { return JSON.parse(localStorage.getItem('admin_config') || '{}'); } catch { return {}; }
  }

  async function doLogin() {
    const envId = $('envId').value.trim();
    const secret = $('secret').value.trim();
    if (!envId || !secret) { $('loginError').textContent = '请填写完整'; return; }
    $('loginError').textContent = '';
    $('loginBtn').disabled = true;
    $('loginBtn').textContent = '验证中...';

    CONFIG = { envId, secret };

    // 验证：尝试调用 manageAdmin getUserList
    const res = await callFunction('manageAdmin', { action: 'getUserList', page: 1, pageSize: 1 });
    if (res.code !== undefined && res.code !== 0 && res.code !== 403) {
      $('loginError').textContent = res.message || '配置错误，请检查环境ID和密钥';
      $('loginBtn').disabled = false;
      $('loginBtn').textContent = '登录管理后台';
      return;
    }
    if (res.code === 403) {
      $('loginError').textContent = '你不是管理员，请先在「日报」小程序中初始化管理员';
      $('loginBtn').disabled = false;
      $('loginBtn').textContent = '登录管理后台';
      return;
    }

    saveConfig();
    $('loginPage').style.display = 'none';
    $('adminLayout').classList.add('active');
    loadStats();
    loadUserList(1);
  }

  function logout() {
    if (!confirm('确定退出登录？')) return;
    localStorage.removeItem('admin_config');
    location.reload();
  }

  // ===== Tab =====
  function switchTab(tab) {
    currentTab = tab;
    currentPage = 1;
    searchResult = null;
    $('searchKeyword').value = '';
    document.querySelectorAll('.tab-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.tab === tab);
    });
    $('searchBar').style.display = tab === 'user' ? 'flex' : 'none';
    if (tab === 'admin') {
      loadAdminList();
    } else {
      loadUserList(1);
    }
  }

  // ===== 统计数据 =====
  async function loadStats() {
    const res = await callFunction('manageAdmin', { action: 'getUserList', page: 1, pageSize: 1000 });
    let total = 0, admin = 0;
    if (res.code === 0 && res.data) {
      total = (res.total || 0);
      admin = res.data.filter(u => u.isAdmin).length;
    }
    $('statTotal').textContent = total;
    $('statAdmin').textContent = admin;
    $('statUser').textContent = total - admin;
  }

  // ===== 用户列表 =====
  async function loadUserList(page) {
    currentPage = page;
    const listEl = $('userList');
    listEl.innerHTML = '<div class="loading-row">加载中...</div>';
    $('pagination').style.display = 'none';

    const res = await callFunction('manageAdmin', { action: 'getUserList', page, pageSize: PAGE_SIZE });
    if (res.code !== 0) {
      listEl.innerHTML = `<div class="empty-state"><div class="icon">❌</div><p>加载失败：${res.message || '未知错误'}</p></div>`;
      return;
    }

    const { data = [], total = 0 } = res;
    renderUserList(data, total);
  }

  // ===== 管理员列表 =====
  async function loadAdminList() {
    const listEl = $('userList');
    listEl.innerHTML = '<div class="loading-row">加载中...</div>';

    const res = await callFunction('manageAdmin', { action: 'getAdminList' });
    if (res.code !== 0) {
      listEl.innerHTML = `<div class="empty-state"><div class="icon">❌</div><p>加载失败：${res.message || '未知错误'}</p></div>`;
      return;
    }

    renderUserList(res.data || [], res.data ? res.data.length : 0, true);
    $('pagination').style.display = 'none';
  }

  // ===== 搜索用户 =====
  async function searchUsers() {
    const keyword = $('searchKeyword').value.trim();
    if (!keyword) { loadUserList(1); return; }

    const listEl = $('userList');
    listEl.innerHTML = '<div class="loading-row">搜索中...</div>';
    $('pagination').style.display = 'none';

    const res = await callFunction('manageAdmin', { action: 'searchUser', keyword });
    if (res.code !== 0) {
      listEl.innerHTML = `<div class="empty-state"><div class="icon">❌</div><p>搜索失败</p></div>`;
      return;
    }

    searchResult = res.data || [];
    renderUserList(searchResult, searchResult.length);
  }

  // ===== 渲染用户列表 =====
  function renderUserList(users, total, hidePagination = false) {
    const listEl = $('userList');
    if (!users || users.length === 0) {
      listEl.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>暂无数据</p></div>`;
      return;
    }

    let html = '';
    for (const u of users) {
      const name = escapeHtml(u.userName || '未命名');
      const dept = escapeHtml(u.department || '—');
      const avatar = (u.userName || 'U')[0].toUpperCase();
      const created = u.createdAt ? formatDate(u.createdAt) : '—';

      if (currentTab === 'admin') {
        html += `
          <div class="user-item">
            <div class="user-avatar">${avatar}</div>
            <div class="user-info">
              <div class="user-name">${name} <span class="badge badge-admin">管理员</span></div>
              <div class="user-meta">${dept}</div>
            </div>
            <div class="user-actions">
              <button class="btn btn-danger btn-sm" onclick="removeAdmin('${u.openid}', '${name}')">移除</button>
            </div>
          </div>`;
      } else {
        html += `
          <div class="user-item">
            <div class="user-avatar">${avatar}</div>
            <div class="user-info">
              <div class="user-name">${name} ${u.isAdmin ? '<span class="badge badge-admin">管理员</span>' : '<span class="badge badge-user">员工</span>'}</div>
              <div class="user-meta" title="${u.openid}">${u.openid.substring(0, 20)}…</div>
              <div class="user-meta">部门：${dept} · 注册：${created}</div>
            </div>
            <div class="user-actions">
              ${u.isAdmin
                ? `<button class="btn btn-outline btn-sm" onclick="removeAdmin('${u.openid}', '${name}')">取消管理</button>`
                : `<button class="btn btn-primary btn-sm" onclick="addAdmin('${u.openid}', '${name}')">设为管理</button>`
              }
            </div>
          </div>`;
      }
    }

    listEl.innerHTML = html;

    if (!hidePagination) {
      $('pagination').style.display = 'flex';
      const totalPages = Math.ceil(total / PAGE_SIZE);
      $('pageInfo').textContent = `第 ${currentPage} / ${totalPages} 页，共 ${total} 人`;
      $('prevBtn').disabled = currentPage <= 1;
      $('nextBtn').disabled = currentPage >= totalPages;
    }
  }

  // ===== 分页 =====
  function changePage(delta) {
    const newPage = currentPage + delta;
    if (newPage < 1) return;
    if (searchResult) { // 搜索模式下不支持分页翻页
      showToast('搜索结果不可翻页，请先清除搜索', 'error');
      return;
    }
    loadUserList(newPage);
  }

  // ===== 设为管理员 =====
  async function addAdmin(openid, name) {
    if (!confirm(`确认将「${name}」设为管理员？`)) return;
    const res = await callFunction('manageAdmin', { action: 'addAdmin', targetOpenid: openid });
    if (res.code === 0) {
      showToast(`「${name}」已成为管理员`);
      loadStats();
      if (currentTab === 'admin') loadAdminList();
      else loadUserList(currentPage);
    } else {
      showToast(res.message || '操作失败', 'error');
    }
  }

  // ===== 移除管理员 =====
  async function removeAdmin(openid, name) {
    if (!confirm(`确认取消「${name}」的管理员身份？`)) return;
    const res = await callFunction('manageAdmin', { action: 'removeAdmin', targetOpenid: openid });
    if (res.code === 0) {
      showToast(`已取消「${name}」的管理员身份`);
      loadStats();
      if (currentTab === 'admin') loadAdminList();
      else loadUserList(currentPage);
    } else {
      showToast(res.message || '操作失败', 'error');
    }
  }

  // ===== 工具 =====
  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function formatDate(v) {
    if (!v) return '—';
    if (typeof v === 'string') return v.substring(0, 10);
    if (v.$numberLong) return new Date(Number(v.$numberLong)).toLocaleString('zh-CN', { year:'numeric', month:'2-digit', day:'2-digit' });
    return String(v);
  }

  // ===== 初始化 =====
  (function init() {
    const saved = loadConfig();
    if (saved.envId && saved.secret) {
      $('envId').value = saved.envId;
      $('secret').value = saved.secret;
      // 自动尝试登录
      doLogin();
    }
  })();
</script>
</body>
</html>
